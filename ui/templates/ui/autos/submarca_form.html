{% extends "ui/base.html" %}

{% block content %}
<div class="container py-4">

  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div class="card shadow-sm border-0">
        <div class="card-header bg-white">
          <h5 class="mb-0">{% if object %}Editar submarca{% else %}Nueva submarca{% endif %}</h5>
        </div>

        <form method="post">
          {% csrf_token %}
          <div class="card-body">
            {{ form.non_field_errors }}

            <div class="mb-3">
              <label class="form-label">Marca</label>
              {{ form.marca }}
              <div class="text-danger small">{{ form.marca.errors }}</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Submarca</label>
              {{ form.nombre }}
              <div class="text-danger small">{{ form.nombre.errors }}</div>
            </div>
          </div>

          <div class="card-footer bg-white d-flex justify-content-end gap-2">
            <a href="{% url 'ui:submarca_list' %}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>

    </div>
  </div>

</div>
{% endblock %}
